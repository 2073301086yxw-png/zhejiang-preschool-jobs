<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="cache-control" content="no-cache, must-revalidate">
<meta http-equiv="expires" content="0">
<title>浙江幼师招聘信息站</title>
<style>
  :root {
    --bg: #faf7f2;
    --card: #ffffff;
    --text: #2d2a26;
    --text-secondary: #8a7e72;
    --accent: #c17f5b;
    --accent-light: #f0e6dc;
    --border: #e8e0d6;
    --tag-bg: #f0e6dc;
    --tag-text: #8b6f56;
    --urgent: #d4534a;
    --title-font: "Georgia","Noto Serif SC",serif;
    --body-font: -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:var(--body-font); background:var(--bg); color:var(--text);
    line-height:1.7; -webkit-font-smoothing:antialiased; padding-bottom:60px;
  }
  .header {
    background:linear-gradient(135deg,#f0e6dc 0%,#faf7f2 100%);
    padding:48px 20px 36px; text-align:center; border-bottom:1px solid var(--border);
  }
  .header h1 {
    font-family:var(--title-font); font-size:28px; font-weight:700; color:var(--text);
    letter-spacing:2px; margin-bottom:8px;
  }
  .header .subtitle { font-size:14px; color:var(--text-secondary); letter-spacing:1px; }
  .header .update-info {
    margin-top:12px; font-size:12px; color:var(--text-secondary);
    background:rgba(255,255,255,0.6); display:inline-block; padding:4px 14px; border-radius:20px;
  }
  .city-tabs {
    display:flex; flex-wrap:wrap; gap:8px; padding:16px 20px;
    justify-content:center; position:sticky; top:0; background:var(--bg);
    z-index:10; border-bottom:1px solid var(--border);
  }
  .city-tab {
    padding:6px 16px; border-radius:20px; font-size:13px; font-weight:500;
    cursor:pointer; transition:all .2s; border:1px solid var(--border);
    background:transparent; color:var(--text-secondary); text-decoration:none;
  }
  .city-tab:hover,.city-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .stats-bar {
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 20px; font-size:13px; color:var(--text-secondary);
  }
  .stats-bar .count { font-weight:600; color:var(--accent); }
  .jobs-container { max-width:640px; margin:0 auto; padding:0 16px; }
  .city-section { margin-bottom:8px; }
  .city-heading {
    display:flex; align-items:center; gap:10px;
    padding:16px 4px 12px; font-family:var(--title-font); font-size:18px;
    font-weight:700; color:var(--text); border-bottom:2px solid var(--accent-light); margin-bottom:12px;
  }
  .city-heading .city-icon {
    width:28px; height:28px; border-radius:50%; background:var(--accent-light);
    display:flex; align-items:center; justify-content:center; font-size:14px;
  }
  .city-heading .city-count { font-size:13px; font-weight:400; color:var(--text-secondary); margin-left:auto; }
  .job-card {
    background:var(--card); border-radius:12px; padding:16px 18px; margin-bottom:10px;
    box-shadow:0 1px 3px rgba(0,0,0,.04); transition:all .2s; border:1px solid var(--border);
  }
  .job-card:hover { box-shadow:0 2px 8px rgba(0,0,0,.06); border-color:var(--accent); }
  .job-card .job-district { font-size:12px; font-weight:500; color:var(--accent); margin-bottom:4px; }
  .job-card .job-title { font-size:16px; font-weight:600; color:var(--text); line-height:1.4; margin-bottom:6px; }
  .job-card .job-title a { color:inherit; text-decoration:none; }
  .job-card .job-title a:hover { color:var(--accent); }
  .job-card .meta { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; font-size:12px; }
  .job-card .meta span {
    display:inline-block; padding:2px 10px; border-radius:4px; background:var(--tag-bg);
    color:var(--tag-text); font-size:12px;
  }
  .job-card .meta .tag-hot { background:#fce8e0; color:var(--urgent); }
  .job-card .meta .tag-new { background:#e0f0e8; color:#3a7a5a; }
  .job-card .deadline { font-size:12px; color:var(--urgent); margin-top:6px; }
  .job-card .deadline.passed { color:var(--text-secondary); }
  .job-card .source {
    font-size:11px; color:var(--text-secondary); margin-top:8px;
    padding-top:8px; border-top:1px solid var(--border); display:flex; justify-content:space-between;
  }
  .job-card .source a { color:var(--accent); text-decoration:none; font-weight:500; }
  .footer { text-align:center; padding:32px 20px; font-size:12px; color:var(--text-secondary); border-top:1px solid var(--border); margin-top:32px; }
  .faq { max-width:640px; margin:24px auto; padding:0 16px; }
  .faq summary { font-size:13px; color:var(--text-secondary); cursor:pointer; padding:8px 0; }
  .faq .tips { font-size:13px; color:var(--text-secondary); line-height:1.8; padding:8px 0; }
  .faq .tips li { list-style:none; padding:2px 0; }
  .faq .tips li::before { content:"• "; color:var(--accent); }
  @media (prefers-color-scheme:dark) {
    :root { --bg:#faf7f2; --card:#fff; --text:#2d2a26; --text-secondary:#8a7e72; }
  }
  @media (max-width:480px) {
    .header { padding:36px 16px 28px; }
    .header h1 { font-size:22px; }
    .city-tabs { gap:6px; padding:12px; }
    .city-tab { padding:5px 12px; font-size:12px; }
    .job-card { padding:14px; }
  }
</style>
</head>
<body>

<div class="footer">
  <p>由 <strong>夏音 🎯</strong> 为相文的学生们维护</p>

  { city:'台州',district:'温岭市',title:'温岭市教育事业单位公开招聘教师53名',url:'https://www.xuexinjiaoshi.com/jiaoshi/list.php?catid=10',type:'事业编',tags:[],deadline:'2026年5月',source:'温岭市教育局'},
  { city:'台州',district:'仙居县',title:'仙居县教育局2026年教师招聘18名（含幼教）',url:'http://qssy.zjks.com/',type:'事业编',tags:[],deadline:'5月15日截止',source:'省通用招聘网报平台'},
  { city:'台州',district:'临海市',title:'临海市中小学2026年新教师招聘（含幼儿园）',url:'https://xuexinjiaoshi.com/',type:'事业编',tags:[],deadline:'2026年5月',source:'临海市教育局'},
  { city:'杭州',district:'滨江区',title:'高新区（滨江）教育局直属幼儿园招聘聘用制教师28名',url:'https://www.gaoxiaojob.com/announcement/detail/395309.html',type:'聘用制',tags:['应届生','🔥'],deadline:'2026年5月',source:'高校人才网'},
  { city:'杭州',district:'萧山区',title:'萧山区招聘幼儿园合同制教师132名',url:'http://hangzhou.offcn.com/html/2026/04/105102.html',type:'合同制',tags:['🔥报名1202'],deadline:'已截止（笔试结束）',source:'中公教育'},
  { city:'杭州',district:'西湖区',title:'西湖区景汇幼儿园诚聘幼儿教师（非事业）',url:'http://www.qtxqjob.com/sydwzp.shtml',type:'非事业编',tags:['🆕'],deadline:'招满即止',source:'钱塘人才网'},
  { city:'杭州',district:'西湖区',title:'西湖区枫华府第学前教育集团招聘教师（非事业）',url:'http://www.eoffcn.com/kszx/detail/2046346.html',type:'非事业编',tags:[],deadline:'招满即止',source:'中公教育'},
  { city:'杭州',district:'西湖区',title:'西湖区都市阳光幼儿园诚聘幼儿教师（非事业）',url:'https://www.gaoxiaojob.com/rczhaopin/zhejiang/xueqianjiaoshi',type:'非事业编',tags:[],deadline:'招满即止',source:'高校人才网'},
  { city:'杭州',district:'富阳区',title:'富阳区2026年教师招聘11名（高层次人才）',url:'http://www.jrzhufu.com/article/99258.html',type:'事业编',tags:['🆕'],deadline:'2026年5月',source:'富阳区教育局'},
  { city:'宁波',district:'海曙区',title:'海曙区教育局2026学年"专曙优师"教育人才招聘',url:'https://www.nbzhaokao.com/article/20260430/019ddf43fb1a7972afb3be47c2ec4c2e',type:'事业编',tags:['🆕','应届生'],deadline:'5月8日-9日现场确认',source:'海曙区教育局'},
  { city:'宁波',district:'市直',title:'宁波幼儿师范高等专科学校招聘学前教育专任教师',url:'https://www.career.zju.edu.cn/jyxt/sczp/zpztgl/ckZpgwXq.zf?zpxxbh=4D1BD1836B5E82B1E0653A68DD0E9B18',type:'事业编',tags:['高校','硕博'],deadline:'具体见公告',source:'浙江大学就业网'},
  { city:'宁波',district:'市直',title:'宁波市宝韵音乐幼儿园招聘幼儿教师',url:'https://www.yingjiesheng.com/zhuanye/jiaoyuxue/ningbo/',type:'事业编',tags:[],deadline:'2026年3月发布',source:'应届生求职网'},
  { city:'绍兴',district:'上虞区',title:'上虞区2026年教师招聘18名（不限户籍）',url:'https://www.xuexinjiaoshi.com/jiaoshi/list.php?catid=16',type:'事业编',tags:['🆕'],deadline:'2026年4月发布',source:'上虞区教体局'},
  { city:'绍兴',district:'诸暨市',title:'诸暨市2026年事业编制教师招聘58名（不限户籍）',url:'http://www.jrzhufu.com/news/news_1.html',type:'事业编',tags:['含幼教'],deadline:'2026年4月发布',source:'诸暨市教体局'},
  { city:'绍兴',district:'柯桥区',title:'柯桥区教体系统中小学储备教师招聘（含幼教）',url:'http://www.jrzhufu.com/zhejiang/',type:'储备教师',tags:[],deadline:'具体见公告',source:'柯桥区教体局'},

  { city:'衢州',district:'龙游县',title:'龙游县2026学年新教师提前批招聘11名',url:'https://www.xuexinjiaoshi.com/jiaoshi/list.php?catid=16',type:'事业编',tags:[],deadline:'2026年4月发布',source:'龙游县教育局'},

];
const CITY_ORDER = ['丽水','温州','金华','台州','杭州','宁波','绍兴','衢州'];
const CITY_ICONS = { '丽水':'🌄','温州':'🌊','金华':'🏯','台州':'🌅','杭州':'🌊','宁波':'🌊','绍兴':'🏛️','衢州':'🏔️' };
const CITY_MAP = { 'lishui':'丽水','wenzhou':'温州','jinhua':'金华','taizhou':'台州','hangzhou':'杭州','ningbo':'宁波','shaoxing':'绍兴','quzhou':'衢州' };
function render(){
  const c=document.getElementById('jobsContainer'); let h='', t=0;
  CITY_ORDER.forEach(city=>{
    const js=JOBS.filter(j=>j.city===city); if(!js.length)return; t+=js.length;
    h+=`<div class="city-section" data-city="${city}"><div class="city-heading"><span class="city-icon">${CITY_ICONS[city]||'📍'}</span><span>${city}</span><span class="city-count">${js.length}条</span></div>`;
    js.forEach(j=>{
      h+=`<div class="job-card"><div class="job-district">📍 ${j.district}</div><div class="job-title"><a href="${j.url}" target="_blank">${j.title}</a></div><div class="meta"><span>${j.type}</span>${j.tags?j.tags.map(t=>{const c=t.includes('🆕')?'tag-new':t.includes('🔥')?'tag-hot':'';return `<span class="${c}">${t}</span>`}).join(''):''}</div>${j.deadline?`<div class="deadline${(j.deadline.includes('截止')||j.deadline.includes('结束'))?' passed':''}">⏰ ${j.deadline}</div>`:''}<div class="source"><span>来源：${j.source}</span><a href="${j.url}" target="_blank">查看原文 →</a></div></div>`;
    });
    h+=`</div>`;
  });
  c.innerHTML=h||`<div class="empty-state"><div class="icon">📭</div><p>暂无招聘信息</p></div>`;
  document.getElementById('totalCount').textContent=t;
}
render();
document.querySelectorAll('.city-tab').forEach(t=>{
  t.addEventListener('click',function(e){
    e.preventDefault();
    document.querySelectorAll('.city-tab').forEach(t=>t.classList.remove('active'));
    this.classList.add('active');
    const k=this.getAttribute('href').slice(1);
    if(k==='all'){document.querySelectorAll('.city-section').forEach(s=>s.style.display='block');document.getElementById('totalCount').textContent=JOBS.length;}
    else{const c=CITY_MAP[k]||k;document.querySelectorAll('.city-section').forEach(s=>s.style.display=s.dataset.city===c?'block':'none');document.getElementById('totalCount').textContent=JOBS.filter(j=>j.city===c).length;}
  });
});
</script>
</body>
</html>
